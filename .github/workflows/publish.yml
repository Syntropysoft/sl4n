name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Pack & Push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/sl4n.Tests/sl4n.Tests.csproj --no-build --configuration Release

      - name: Pack sl4n
        run: dotnet pack src/sl4n/sl4n.csproj --no-build --configuration Release --output ./nupkgs

      - name: Pack sl4n.AspNetCore
        run: dotnet pack src/sl4n.AspNetCore/sl4n.AspNetCore.csproj --no-build --configuration Release --output ./nupkgs

      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
